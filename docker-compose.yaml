services:
  mysql:
    image: 'mysql:8.4.9'
    environment:
      - 'MYSQL_DATABASE=clean-ecommerce'
      - 'MYSQL_PASSWORD=cwchoiit'
      - 'MYSQL_ROOT_PASSWORD=root'
      - 'MYSQL_USER=cwchoiit'
    ports:
      - '3306:3306'

  minio: # 파일을 저장하는 서버. S3와 똑같이 동작하는 오픈소스 (무료, 내 PC에서 직접 실행)
    image: 'minio/minio:RELEASE.2024-12-18T13-15-44Z'
    command: server /data --console-address ":9001"
    environment:
      - 'MINIO_ROOT_USER=devminio'
      - 'MINIO_ROOT_PASSWORD=devminio12345'
    ports:
      - '9000:9000' # 파일 저장/조회 API
      - '9001:9001' # 브라우저로 들어가서 파일 확인하는 관리자 UI
    volumes:
      - 'minio-data:/data'

  minio-bootstrap: # MinIO가 뜨자마자 버킷을 만들고 종료하는 일회성 세팅 스크립트
    image: 'minio/mc:RELEASE.2024-11-21T17-21-54Z'
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 devminio devminio12345; do sleep 1; done;
      /usr/bin/mc mb -p local/product-images || true;
      /usr/bin/mc anonymous set download local/product-images;
      "

volumes:
  minio-data: